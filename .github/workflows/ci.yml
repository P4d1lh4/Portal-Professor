name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Rodar pytest + cobertura
        run: pytest -q --cov=app --cov-report=term-missing --cov-fail-under=50

  frontend:
    name: Frontend (tsc + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependências
        run: npm ci

      - name: Lint (eslint)
        run: npm run lint

      - name: Type-check (tsc --noEmit)
        run: npx tsc --noEmit

      - name: Testes (vitest)
        run: npm run test

      - name: Build (vite)
        env:
          # Stubs para o build passar mesmo sem secrets reais.
          # Em produção, defina como repository secrets.
          VITE_SUPABASE_URL: https://stub.supabase.co
          VITE_SUPABASE_ANON_KEY: stub-anon-key
          VITE_API_BASE_URL: http://localhost:8000
        run: npm run build
